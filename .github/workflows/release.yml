# 自动编译：仅 3 包
# - Mac Intel (x64) dmg
# - Mac Apple Silicon (arm64) dmg
# - Windows x64 nsis
# 推 main / tag v* / 手动 → 发布到 GitHub Release
name: Build & Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # 新 push 可取消旧打包，但 mac 任务会在新 run 里完整重跑
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # 禁止 electron-builder 自动乱发
  CSC_IDENTITY_AUTO_DISCOVERY: 'false'

jobs:
  test:
    name: Pre-build tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Icons present
        run: test -f build/icon.png && test -f build/icon.icns && test -f build/icon.ico
      - run: npm test
        env:
          CI: 'true'
          ELECTRON_DISABLE_GPU: '1'

  # 分架构打包，避免双 arch 并行挂同一 /Volumes/CompetitorScout 导致 hdiutil detach 失败
  build-mac:
    name: Build macOS (${{ matrix.arch }})
    needs: test
    runs-on: macos-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            script: dist:mac:x64
          - arch: arm64
            script: dist:mac:arm64
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build DMG (${{ matrix.arch }})
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist
        run: ls -lah dist || true

      - name: Upload mac ${{ matrix.arch }}
        uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.arch }}
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 30

  build-win:
    name: Build Windows (x64)
    needs: test
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build NSIS
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist
        shell: bash
        run: ls -lah dist || true

      - name: Upload windows
        uses: actions/upload-artifact@v7
        with:
          name: windows-x64
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download mac x64
        uses: actions/download-artifact@v8
        with:
          name: macos-x64
          path: release-assets

      - name: Download mac arm64
        uses: actions/download-artifact@v8
        with:
          name: macos-arm64
          path: release-assets

      - name: Download windows
        uses: actions/download-artifact@v8
        with:
          name: windows-x64
          path: release-assets

      - name: List assets
        run: ls -lah release-assets

      - name: Create versioned Release (tag v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Latest Release (main)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          body: |
            自动构建自 `main`（`${{ github.sha }}`）。

            ## 下载（3 个包）

            | 平台 | 文件 |
            |------|------|
            | **Mac Apple Silicon (M 系列)** | `CompetitorScout-*-mac-arm64.dmg` |
            | **Mac Intel** | `CompetitorScout-*-mac-x64.dmg` |
            | **Windows x64** | `CompetitorScout-*-win-x64.exe` |

            ## macOS「已损坏」？

            未做 Apple 公证时的正常提示：

            ```bash
            xattr -cr /Applications/CompetitorScout.app
            open /Applications/CompetitorScout.app
            ```
          files: release-assets/*
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
