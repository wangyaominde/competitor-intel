# 自测：密钥护栏 + 跨平台测试（不打包）
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  # 仅取消同 workflow 旧 run，避免红徽章雪崩；构建走独立 workflow
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secrets guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Ensure secrets/data not tracked
        run: |
          set -e
          if [ -d .data ]; then
            echo "::error::.data must not be present in CI checkout as committed tree"
          fi
          if git ls-files | grep -E '(^\.data/|competitor-scout-config\.json$|competitor-intel-config\.json$|competitor-scout\.json$|competitor-intel\.json$|\.env$)'; then
            echo "::error::Tracked secret/data files found"
            git ls-files | grep -E '(^\.data/|competitor-.*\.json$|\.env$)' || true
            exit 1
          fi
          echo "OK: no secret paths tracked"

      - name: Install deps (scripts only)
        run: npm ci --ignore-scripts

      - name: Secrets scan
        run: npm run test:secrets

  test:
    name: Self-test (${{ matrix.os }})
    needs: secrets
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_GET_USE_PROXY: 'false'

      - name: Verify icon assets present
        shell: bash
        run: |
          test -f build/icon.png
          test -f build/icon.icns
          test -f build/icon.ico
          ls -la build/icon.*

      - name: Smoke + system tests
        run: npm test
        env:
          CI: 'true'
          # headless-ish: skip GPU noise
          ELECTRON_DISABLE_GPU: '1'

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs-${{ matrix.os }}
          path: |
            *.log
            .data/startup.log
          if-no-files-found: ignore
