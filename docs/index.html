<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="竞品情报 CompetitorScout — 与桌面版同壳的交互 Demo" />
  <meta name="theme-color" content="#0b0d13" />
  <title>Demo · 竞品情报</title>
  <base href="/competitor-scout/" />
  <!-- 与桌面端同一套样式 -->
  <link rel="stylesheet" href="/competitor-scout/styles/app.css" />
  <link rel="stylesheet" href="/competitor-scout/styles/demo-overlay.css" />
  <link rel="icon" type="image/png" href="/competitor-scout/favicon.png" />
  <link rel="apple-touch-icon" href="/competitor-scout/icon-192.png" />
</head>
<body>
  <div class="demo-ribbon">
    <div>
      <span class="pill">DEMO</span>
      <strong style="margin-left:8px">竞品情报</strong>
      <span> · 浏览器模拟桌面端（示例数据，无真实 LLM）</span>
    </div>
    <div>
      <a href="https://github.com/wangyaominde/competitor-scout" target="_blank" rel="noopener">GitHub</a>
      ·
      <a href="https://github.com/wangyaominde/competitor-scout/releases/tag/latest" target="_blank" rel="noopener">下载 Release</a>
    </div>
  </div>

  <div id="app" class="demo-app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark has-icon" title="CompetitorScout"></div>
        <div class="brand-text">
          <strong>竞品情报</strong>
          <span>Competitor Scout</span>
        </div>
      </div>

      <div class="ready-mini" title="Demo 已就绪">
        <div class="ready-mini-top">
          <span>就绪度</span>
          <strong>100%</strong>
        </div>
        <div class="ready-track"><i style="width:100%"></i></div>
      </div>

      <nav class="nav" id="nav">
        <button type="button" class="nav-item active" data-page="dashboard"><span class="nav-icon">◈</span> 仪表盘</button>
        <button type="button" class="nav-item" data-page="competitors"><span class="nav-icon">◎</span> 竞品库</button>
        <button type="button" class="nav-item" data-page="scan"><span class="nav-icon">⟳</span> 智能扫描</button>
        <button type="button" class="nav-item" data-page="compare"><span class="nav-icon">☰</span> 参数对比</button>
        <button type="button" class="nav-item" data-page="product"><span class="nav-icon">◇</span> 我的产品</button>
        <button type="button" class="nav-item" data-page="space"><span class="nav-icon">✦</span> 威胁空间</button>
        <button type="button" class="nav-item" data-page="settings"><span class="nav-icon">⚙</span> 设置</button>
      </nav>

      <div class="sidebar-footer">
        <div class="loop-pill" id="loop-pill">
          <span class="dot"></span>
          <span>Loop 未启动 · Demo</span>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="page-title">仪表盘</h1>
          <p class="subtitle" id="page-sub">威胁态势与待确认竞品</p>
        </div>
        <div class="topbar-actions">
          <button type="button" class="btn ghost" title="通知">🔔</button>
          <button type="button" class="btn" id="btn-export-demo">导出</button>
          <button type="button" class="btn primary" id="btn-quick-scan">立即扫描</button>
        </div>
      </header>
      <div class="content" id="content"></div>
    </main>
  </div>

  <div id="toasts" class="toasts"></div>

  <div id="modal" class="modal hidden">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-card" id="modal-card"></div>
  </div>

  <script src="/competitor-scout/data.js"></script>
  <script src="/competitor-scout/js/demo-app.js"></script>
</body>
</html>
